<!DOCTYPE html>
<html>
<head>
    <title>Palanca Network Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #cy { width: 100%; height: 100vh; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div id="cy"></div>
    
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Create a simple test graph
        const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [
                // Nodes
                { data: { id: 'a', label: 'Issuer 1' } },
                { data: { id: 'b', label: 'Wallet 1' } },
                { data: { id: 'c', label: 'Wallet 2' } },
                
                // Edges
                { data: { id: 'ab', source: 'a', target: 'b', amount: 100 } },
                { data: { id: 'ac', source: 'a', target: 'c', amount: 300 } }
            ],
            style: [
                {
                    selector: 'node',
                    style: {
                        'background-color': '#666',
                        'label': 'data(label)'
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 3,
                        'line-color': '#ccc',
                        'target-arrow-color': '#ccc',
                        'target-arrow-shape': 'triangle'
                    }
                }
            ],
            layout: { name: 'circle' }
        });
        
        console.log('Cytoscape loaded! Nodes:', cy.nodes().length);
    });
    </script>
</body>
</html>
